<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">The Radius of Order</title>
  <desc id="desc">A dark editorial illustration of concentric civic rings radiating from a bright city core into increasingly austere outer zones, overlaid on a faint American grid.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06090f"/>
      <stop offset="55%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <radialGradient id="core" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#f4d58d"/>
      <stop offset="20%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#60a5fa" stop-opacity="0.25"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <g opacity="0.18" stroke="#94a3b8" stroke-width="1">
    <path d="M0 110 H1200"/>
    <path d="M0 190 H1200"/>
    <path d="M0 270 H1200"/>
    <path d="M0 350 H1200"/>
    <path d="M0 430 H1200"/>
    <path d="M0 510 H1200"/>
    <path d="M120 0 V630"/>
    <path d="M260 0 V630"/>
    <path d="M400 0 V630"/>
    <path d="M540 0 V630"/>
    <path d="M680 0 V630"/>
    <path d="M820 0 V630"/>
    <path d="M960 0 V630"/>
    <path d="M1100 0 V630"/>
  </g>

  <g transform="translate(600 315)">
    <circle r="230" fill="#0f172a" opacity="0.42"/>
    <circle r="215" fill="none" stroke="url(#ring)" stroke-width="28" opacity="0.55"/>
    <circle r="165" fill="none" stroke="#64748b" stroke-width="24" opacity="0.45"/>
    <circle r="118" fill="none" stroke="#94a3b8" stroke-width="20" opacity="0.5"/>
    <circle r="74" fill="none" stroke="#cbd5e1" stroke-width="16" opacity="0.65"/>
    <circle r="38" fill="#f59e0b" filter="url(#glow)"/>
    <circle r="90" fill="url(#core)" opacity="0.8"/>
  </g>

  <g opacity="0.7">
    <circle cx="600" cy="315" r="7" fill="#fff7ed"/>
    <circle cx="600" cy="315" r="4" fill="#ffffff"/>
  </g>

  <g fill="#f8fafc" font-family="Georgia, 'Times New Roman', serif">
    <text x="74" y="112" font-size="58" font-weight="700">The Radius of Order</text>
    <text x="76" y="154" font-size="24" opacity="0.85">A five-zone American justice map, drawn from the center outward</text>
  </g>

  <g fill="#cbd5e1" font-family="Arial, Helvetica, sans-serif" font-size="15" letter-spacing="1.8">
    <text x="854" y="176">ZONE 1  CITY CORE</text>
    <text x="882" y="236">ZONE 2  INNER RING</text>
    <text x="902" y="302">ZONE 3  EXURBAN BELT</text>
    <text x="888" y="372">ZONE 4  HINTERLAND</text>
    <text x="854" y="448">ZONE 5  CONTAINMENT EDGE</text>
  </g>
</svg>
