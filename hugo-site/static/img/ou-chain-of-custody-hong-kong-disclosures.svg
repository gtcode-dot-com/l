<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="hk-title hk-desc">
  <title id="hk-title">Hong Kong disclosures and strategic value schematic</title>
  <desc id="hk-desc">A schematic showing Snowden's South China Morning Post disclosures in Hong Kong, the Chinese and Hong Kong targets named publicly, and the strategic value those disclosures created for Beijing.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="800" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#111824"/>
      <stop offset="1" stop-color="#0b1017"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#171f2c"/>
      <stop offset="1" stop-color="#101722"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e8c566"/>
      <stop offset="1" stop-color="#d4a843"/>
    </linearGradient>
    <linearGradient id="sig12" x1="308" y1="0" x2="340" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7ec8ff"/>
      <stop offset="1" stop-color="#e8c566"/>
    </linearGradient>
    <linearGradient id="sig23" x1="788" y1="0" x2="820" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7ec8ff"/>
      <stop offset="1" stop-color="#e8c566"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#000" flood-opacity="0.26"/>
    </filter>
    <style>
      .frame{fill:url(#bg);stroke:#30363d;stroke-width:2}
      .panel{fill:url(#panel);stroke:#30363d;stroke-width:1.5}
      .sub{fill:#0f1621;stroke:#2b3544;stroke-width:1.5}
      .title{font:700 32px "Space Grotesk","Segoe UI",sans-serif;fill:#f0f2f5}
      .subtitle{font:400 15px "Segoe UI",sans-serif;fill:#a7b1bc}
      .badge{font:700 12px "Segoe UI",sans-serif;fill:#0d1117;letter-spacing:1.6px}
      .ptitle{font:700 19px "Space Grotesk","Segoe UI",sans-serif;fill:#f0f2f5}
      .kicker{font:700 12px "Segoe UI",sans-serif;fill:#e8c566;letter-spacing:1.6px}
      .lbl{font:600 15px "Segoe UI",sans-serif;fill:#f0f2f5}
      .body{font:400 14px "Segoe UI",sans-serif;fill:#c4ccd5}
      .note{font:400 13px "Segoe UI",sans-serif;fill:#9aa5b2}
      .div{fill:none;stroke:#425064;stroke-width:1.5}
    </style>
  </defs>

  <!-- frame: bottom at 784 -->
  <rect class="frame" x="16" y="16" width="1168" height="768" rx="24"/>

  <!-- header -->
  <text class="title" x="56" y="66">Hong Kong-Period Public Disclosures</text>
  <text class="subtitle" x="56" y="94">How named PRC and Hong Kong targets created intelligence and diplomatic value during the protection window.</text>
  <rect x="1024" y="54" width="116" height="28" rx="14" fill="url(#accent)"/>
  <text class="badge" x="1082" y="73" text-anchor="middle">SCHEMATIC</text>

  <!-- ═══ STAGE 1 — Disclosure channel ═══ -->
  <!-- panels: y=128, h=556, bottom=684 -->
  <rect class="panel" x="56" y="128" width="252" height="556" rx="18" filter="url(#shadow)"/>
  <text class="kicker" x="80" y="166">STAGE 1</text>
  <text class="ptitle" x="80" y="194">Disclosure channel</text>
  <line class="div" x1="80" y1="208" x2="284" y2="208"/>

  <rect class="sub" x="80" y="232" width="204" height="143" rx="14"/>
  <text class="lbl" x="100" y="262">Snowden &#x2192; SCMP</text>
  <text class="body" x="100" y="290">June 12 interview</text>
  <text class="body" x="100" y="310">in Hong Kong named</text>
  <text class="body" x="100" y="330">PRC / HK targets</text>
  <text class="body" x="100" y="350">publicly.</text>

  <rect class="sub" x="80" y="399" width="204" height="189" rx="14"/>
  <text class="lbl" x="100" y="429">Why timing mattered</text>
  <text class="body" x="100" y="457">Disclosures landed</text>
  <text class="body" x="100" y="477">while HK authorities</text>
  <text class="body" x="100" y="497">were deciding</text>
  <text class="body" x="100" y="517">whether to act on</text>
  <text class="body" x="100" y="537">the U.S. request.</text>

  <!-- ═══ STAGE 2 — Targets named publicly ═══ -->
  <rect class="panel" x="340" y="128" width="448" height="556" rx="18" filter="url(#shadow)"/>
  <text class="kicker" x="364" y="166">STAGE 2</text>
  <text class="ptitle" x="364" y="194">Targets named publicly</text>
  <line class="div" x1="364" y1="208" x2="764" y2="208"/>

  <!-- row 1 -->
  <rect class="sub" x="364" y="232" width="186" height="162" rx="14"/>
  <text class="lbl" x="384" y="262">Tsinghua University</text>
  <text class="body" x="384" y="290">Premier PRC</text>
  <text class="body" x="384" y="310">university with</text>
  <text class="body" x="384" y="330">major backbone</text>
  <text class="body" x="384" y="350">relevance. 63</text>
  <text class="body" x="384" y="370">systems cited.</text>

  <rect class="sub" x="578" y="232" width="186" height="162" rx="14"/>
  <text class="lbl" x="598" y="262">Chinese University</text>
  <text class="lbl" x="598" y="282">of Hong Kong</text>
  <text class="body" x="598" y="310">Named local</text>
  <text class="body" x="598" y="330">academic target</text>
  <text class="body" x="598" y="350">in the HK node.</text>

  <!-- row 2 -->
  <rect class="sub" x="364" y="422" width="186" height="162" rx="14"/>
  <text class="lbl" x="384" y="452">China Mobile /</text>
  <text class="lbl" x="384" y="472">China Unicom</text>
  <text class="body" x="384" y="500">Carrier targets</text>
  <text class="body" x="384" y="520">tied to SMS and</text>
  <text class="body" x="384" y="540">network backbones.</text>

  <rect class="sub" x="578" y="422" width="186" height="162" rx="14"/>
  <text class="lbl" x="598" y="452">Pacnet</text>
  <text class="body" x="598" y="480">Asia-Pacific cable</text>
  <text class="body" x="598" y="500">operator; 46,000 km</text>
  <text class="body" x="598" y="520">submarine fiber</text>
  <text class="body" x="598" y="540">across 13 countries.</text>

  <!-- ═══ STAGE 3 — Strategic value to Beijing ═══ -->
  <rect class="panel" x="820" y="128" width="320" height="556" rx="18" filter="url(#shadow)"/>
  <text class="kicker" x="844" y="166">STAGE 3</text>
  <text class="ptitle" x="844" y="194">Strategic value to Beijing</text>
  <line class="div" x1="844" y1="208" x2="1116" y2="208"/>

  <!-- 3 cards: SP1/SP2 h=125 (+10%), SP3 h=114, SP2 down 11, SP3 down 22 -->
  <rect class="sub" x="844" y="232" width="272" height="125" rx="14"/>
  <text class="lbl" x="866" y="262">Target confirmation</text>
  <text class="body" x="866" y="290">Named institutions and carriers</text>
  <text class="body" x="866" y="310">exposed U.S. collection</text>
  <text class="body" x="866" y="330">priorities.</text>

  <rect class="sub" x="844" y="383" width="272" height="125" rx="14"/>
  <text class="lbl" x="866" y="413">Backbone visibility</text>
  <text class="body" x="866" y="441">Carrier and cable references</text>
  <text class="body" x="866" y="461">illuminated upstream collection</text>
  <text class="body" x="866" y="481">terrain.</text>

  <rect class="sub" x="844" y="534" width="272" height="114" rx="14"/>
  <text class="lbl" x="866" y="564">Diplomatic reframing</text>
  <text class="body" x="866" y="592">State media could blunt the</text>
  <text class="body" x="866" y="612">Unit 61398 pressure cycle.</text>

  <!-- ═══ Connectors — inline arrowheads ═══ -->

  <!-- Stage 1 → Stage 2 -->
  <path d="M308 410 C318 396 326 410 332 410" fill="none" stroke="url(#sig12)" stroke-width="3" stroke-linecap="round"/>
  <polygon points="340,410 332,406 332,414" fill="#e8c566"/>

  <!-- Stage 2 → Stage 3 card 1 (center y=294) -->
  <path d="M788 310 C804 310 804 294 836 294" fill="none" stroke="url(#sig23)" stroke-width="3" stroke-linecap="round"/>
  <polygon points="844,294 836,290 836,298" fill="#e8c566"/>

  <!-- Stage 2 → Stage 3 card 2 (center y=445) -->
  <path d="M788 430 C804 430 804 445 836 445" fill="none" stroke="url(#sig23)" stroke-width="3" stroke-linecap="round"/>
  <polygon points="844,445 836,441 836,449" fill="#e8c566"/>

  <!-- Stage 2 → Stage 3 card 3 (center y=591) -->
  <path d="M788 510 C804 510 804 591 836 591" fill="none" stroke="url(#sig23)" stroke-width="3" stroke-linecap="round"/>
  <polygon points="844,591 836,587 836,595" fill="#e8c566"/>

  <!-- ═══ Note bar ═══ -->
  <!-- y=706, h=50, bottom=756, frame bottom=784 -->
  <rect class="sub" x="56" y="706" width="1084" height="50" rx="14"/>
  <text class="note" x="80" y="736">Figure is schematic. It maps target categories to downstream strategic effects as described in the article's sourced reporting.</text>
</svg>
