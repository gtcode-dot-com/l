<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 750" width="100%" role="img" aria-label="Strategic Double Bind Flowchart">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0d14"/>
      <stop offset="100%" stop-color="#111625"/>
    </linearGradient>

    <!-- Node Gradient (Neutral) -->
    <linearGradient id="nodeNeutral" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1b2330"/>
      <stop offset="100%" stop-color="#121820"/>
    </linearGradient>

    <!-- Node Gradient (Red Accent / Pathologization) -->
    <linearGradient id="nodeRed" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a1b1d"/>
      <stop offset="100%" stop-color="#1f1214"/>
    </linearGradient>

    <!-- Node Gradient (Teal Accent / Records-First) -->
    <linearGradient id="nodeTeal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#142728"/>
      <stop offset="100%" stop-color="#0e1b1c"/>
    </linearGradient>

    <!-- Arrow Marker -->
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 1.5L8 5L0 8.5Z" fill="#526b82"/>
    </marker>
    
    <marker id="arrowRed" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 1.5L8 5L0 8.5Z" fill="#b94a4f"/>
    </marker>

    <marker id="arrowTeal" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 1.5L8 5L0 8.5Z" fill="#2d8f85"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1000" height="750" rx="16" fill="url(#bg)" stroke="#1f293d" stroke-width="2"/>

  <!-- Title / Header -->
  <text x="50" y="55" fill="#f0f3f6" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" letter-spacing="0.5">STRATEGIC DOUBLE BIND</text>
  <text x="50" y="80" fill="#6f859b" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="500" letter-spacing="1">INOCULATION THEORY AND ARCHIVE DEFENSE LOGIC</text>
  <line x1="50" y1="95" x2="950" y2="95" stroke="#1f293d" stroke-width="1.5"/>

  <!-- Flowchart Elements -->

  <!-- Node A: Unavailability of Author -->
  <g transform="translate(340, 125)">
    <rect width="320" height="70" rx="10" fill="url(#nodeNeutral)" stroke="#3b4b5e" stroke-width="1.5"/>
    <text x="160" y="30" text-anchor="middle" fill="#f0f3f6" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700">Unavailability of Author</text>
    <text x="160" y="50" text-anchor="middle" fill="#8ca2b9" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="500">Public Records Left Behind</text>
  </g>

  <!-- Arrow A -> B -->
  <path d="M500,195 L500,225" fill="none" stroke="#526b82" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Node B: Response Pattern -->
  <g transform="translate(320, 235)">
    <rect width="360" height="85" rx="10" fill="url(#nodeNeutral)" stroke="#3b4b5e" stroke-width="1.5"/>
    <text x="180" y="28" text-anchor="middle" fill="#f0f3f6" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700">Institutional / Public</text>
    <text x="180" y="48" text-anchor="middle" fill="#8ca2b9" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700">Response Pattern:</text>
    <text x="180" y="68" text-anchor="middle" fill="#d97706" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" letter-spacing="0.5">Biographical Framing</text>
  </g>

  <!-- Arrow B -> C -->
  <path d="M500,320 L500,350" fill="none" stroke="#526b82" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Node C: Reviewer's Choice (Diamond) -->
  <g transform="translate(500, 395)">
    <!-- Custom diamond geometry path -->
    <path d="M0,-35 L120,0 L0,35 L-120,0 Z" fill="url(#nodeNeutral)" stroke="#c29a3e" stroke-width="2"/>
    <text x="0" y="5" text-anchor="middle" fill="#f0f3f6" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700">Reviewer's Choice</text>
  </g>

  <!-- Left Path (Option A) Connectors -->
  <!-- Line goes out left from diamond tip, then down -->
  <path d="M380,395 L220,395 L220,445" fill="none" stroke="#b94a4f" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arrowRed)"/>
  <rect x="110" y="355" width="220" height="24" rx="4" fill="#1b1214" stroke="#5c2023" stroke-width="1"/>
  <text x="220" y="371" text-anchor="middle" fill="#f87171" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700">Option A: Accept Pathologization</text>

  <!-- Right Path (Option B) Connectors -->
  <!-- Line goes out right from diamond tip, then down -->
  <path d="M620,395 L780,395 L780,445" fill="none" stroke="#2d8f85" stroke-width="2" marker-end="url(#arrowTeal)"/>
  <rect x="670" y="355" width="220" height="24" rx="4" fill="#0d1b1c" stroke="#1c4e4a" stroke-width="1"/>
  <text x="780" y="371" text-anchor="middle" fill="#2dd4bf" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700">Option B: Bypasses Biography</text>

  <!-- Node D (Left Branch): Confirms reliance on biography-discrediting -->
  <g transform="translate(70, 455)">
    <rect width="300" height="95" rx="10" fill="url(#nodeRed)" stroke="#7f1d1d" stroke-width="1.5"/>
    <text x="150" y="28" text-anchor="middle" fill="#fca5a5" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600">Confirms reliance on</text>
    <text x="150" y="48" text-anchor="middle" fill="#fca5a5" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600">biography-discrediting</text>
    <text x="150" y="68" text-anchor="middle" fill="#ef4444" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="500" font-style="italic">rather than</text>
    <text x="150" y="83" text-anchor="middle" fill="#f87171" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700">record adjudication</text>
  </g>

  <!-- Node E (Right Branch): Audits raw records -->
  <g transform="translate(630, 455)">
    <rect width="300" height="95" rx="10" fill="url(#nodeTeal)" stroke="#0f766e" stroke-width="1.5"/>
    <text x="150" y="43" text-anchor="middle" fill="#99f6e4" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700">Audits raw records</text>
    <text x="150" y="63" text-anchor="middle" fill="#2dd4bf" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700">on their merits</text>
  </g>

  <!-- Arrow D -> F -->
  <path d="M220,550 L220,590" fill="none" stroke="#b94a4f" stroke-width="2" marker-end="url(#arrowRed)"/>

  <!-- Arrow E -> G -->
  <path d="M780,550 L780,590" fill="none" stroke="#2d8f85" stroke-width="2" marker-end="url(#arrowTeal)"/>

  <!-- Node F: Demonstrates avoidance of structural evidence -->
  <g transform="translate(70, 600)">
    <rect width="300" height="90" rx="10" fill="url(#nodeRed)" stroke="#7f1d1d" stroke-width="1.5"/>
    <text x="150" y="33" text-anchor="middle" fill="#fca5a5" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600">Demonstrates avoidance</text>
    <text x="150" y="53" text-anchor="middle" fill="#fca5a5" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600">of documented</text>
    <text x="150" y="73" text-anchor="middle" fill="#ef4444" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700">structural evidence</text>
  </g>

  <!-- Node G: Tests merits of disclosures, etc. -->
  <g transform="translate(630, 600)">
    <rect width="300" height="90" rx="10" fill="url(#nodeTeal)" stroke="#0f766e" stroke-width="1.5"/>
    <text x="150" y="30" text-anchor="middle" fill="#99f6e4" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600">Tests merits of disclosures,</text>
    <text x="150" y="50" text-anchor="middle" fill="#99f6e4" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600">CJC records, and</text>
    <text x="150" y="70" text-anchor="middle" fill="#2dd4bf" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700">donor networks</text>
  </g>
</svg>
