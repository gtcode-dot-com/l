   </g>
   <g id="text_6">
    <text style="font-size: 8.6px; font-family: 'DejaVu Sans'; fill: #17202a" transform="translate(385.095931 178.958669)">attn_out moved</text>
    <text style="font-size: 8.6px; font-family: 'DejaVu Sans'; fill: #17202a" transform="translate(368.146541 189.362653)">controls; random heads</text>
    <text style="font-size: 8.6px; font-family: 'DejaVu Sans'; fill: #17202a" transform="translate(390.429947 199.691387)">looked better</text>
   </g>
   <g id="text_7">
