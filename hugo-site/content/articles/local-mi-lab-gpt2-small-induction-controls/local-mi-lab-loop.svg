   </g>
   <g id="text_4">
    <text style="font-size: 8.6px; font-family: 'DejaVu Sans'; fill: #17202a" transform="translate(264.780203 320.497783)">Raw previous-token</text>
    <text style="font-size: 8.6px; font-family: 'DejaVu Sans'; fill: #17202a" transform="translate(266.347016 331.220908)">attention also fired</text>
    <text style="font-size: 8.6px; font-family: 'DejaVu Sans'; fill: #17202a" transform="translate(267.350797 341.110907)">on control families</text>
   </g>
   <g id="text_5">
    <text style="font-weight: 700; font-size: 11.5px; font-family: 'DejaVu Sans'; text-anchor: middle; fill: #d88728" x="455.868" y="163.066794" transform="rotate(-0 455.868 163.066794)">Layer Patching</text>
   </g>
   <g id="text_6">
    <text style="font-size: 8.6px; font-family: 'DejaVu Sans'; fill: #17202a" transform="translate(421.837531 178.958669)">attn_out moved</text>
    <text style="font-size: 8.6px; font-family: 'DejaVu Sans'; fill: #17202a" transform="translate(404.888141 189.362653)">controls; random heads</text>
    <text style="font-size: 8.6px; font-family: 'DejaVu Sans'; fill: #17202a" transform="translate(427.171547 199.691387)">looked better</text>
   </g>
   <g id="text_7">
    <text style="font-weight: 700; font-size: 11.5px; font-family: 'DejaVu Sans'; text-anchor: middle; fill: #7a5dbb" x="604.584" y="304.486314" transform="rotate(-0 604.584 304.486314)">hook_z Sweep</text>
   </g>
   <g id="text_8">
    <text style="font-size: 8.6px; font-family: 'DejaVu Sans'; fill: #17202a" transform="translate(561.438875 320.892173)">72 heads x 3 seeds;</text>
    <text style="font-size: 8.6px; font-family: 'DejaVu Sans'; fill: #17202a" transform="translate(580.444875 331.220908)">five narrow</text>
    <text style="font-size: 8.6px; font-family: 'DejaVu Sans'; fill: #17202a" transform="translate(569.612234 341.110907)">local candidates</text>
   </g>
   <g id="text_9">
    <text style="font-weight: 700; font-size: 11.5px; font-family: 'DejaVu Sans'; text-anchor: middle; fill: #c94c4c" x="753.3" y="163.066794" transform="rotate(-0 753.3 163.066794)">Held-Out</text>
   </g>
   <g id="text_10">
    <text style="font-size: 8.6px; font-family: 'DejaVu Sans'; fill: #17202a" transform="translate(720.173875 179.472653)">16 fixed heads;</text>
    <text style="font-size: 8.6px; font-family: 'DejaVu Sans'; fill: #17202a" transform="translate(728.233016 189.362653)">11 falsified,</text>
    <text style="font-size: 8.6px; font-family: 'DejaVu Sans'; fill: #17202a" transform="translate(722.356797 198.858262)">5 downgraded</text>
   </g>
   <g id="text_11">
    <text style="font-weight: 700; font-size: 12px; font-family: 'DejaVu Sans'; text-anchor: middle; fill: #17202a" x="490.86" y="372.379736" transform="rotate(-0 490.86 372.379736)">Each step made the intervention narrower, then gave controls another chance to break the story.</text>
